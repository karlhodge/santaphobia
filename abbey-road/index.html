<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abbey Road Studio Two</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#fff}
canvas{display:block}

/* Overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.5s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:3.2rem;font-weight:200;letter-spacing:0.6em;margin-bottom:0.3em;text-transform:uppercase}
#overlay h2{font-size:1rem;font-weight:300;letter-spacing:0.4em;color:#aaa;margin-bottom:2.5em;text-transform:uppercase}
#controls-legend{font-size:0.75rem;font-weight:300;letter-spacing:0.15em;color:#888;line-height:2;margin-bottom:2em;text-align:center}
#controls-legend span{color:#ffcc66}
#enterBtn{padding:0.8em 2.6em;font-size:0.9rem;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.3);cursor:pointer;transition:all 0.3s}
#enterBtn:hover:not(:disabled){border-color:#ffcc66;color:#ffcc66}
#enterBtn:disabled{opacity:0.4;cursor:default}

/* Status */
#status{position:fixed;bottom:16px;left:16px;font-size:0.7rem;font-weight:300;letter-spacing:0.12em;color:#888;z-index:90}

/* Crosshair */
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:80;display:none}
#crosshair .h,#crosshair .v{position:absolute;background:#fff}
#crosshair .h{width:20px;height:2px;top:-1px;left:-10px}
#crosshair .v{width:2px;height:20px;top:-10px;left:-1px}
</style>
</head>
<body>

<div id="overlay">
  <h1>Abbey Road</h1>
  <h2>Studio Two &middot; 1966</h2>
  <div id="controls-legend">
    <span>W A S D</span> Move &nbsp;&middot;&nbsp; <span>Mouse</span> Look &nbsp;&middot;&nbsp; <span>Esc</span> Release mouse
  </div>
  <button id="enterBtn" disabled>Loading&hellip;</button>
</div>

<div id="status">Fetching model&hellip;</div>
<div id="coordHUD" style="position:fixed;top:12px;right:12px;font-family:monospace;font-size:0.8rem;color:#0f0;background:rgba(0,0,0,0.6);padding:8px 12px;border-radius:4px;z-index:90;display:none;line-height:1.6;pointer-events:none;white-space:pre"></div>

<div id="crosshair"><div class="h"></div><div class="v"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
'use strict';

// ── DOM refs ──
const overlay   = document.getElementById('overlay');
const enterBtn  = document.getElementById('enterBtn');
const statusEl  = document.getElementById('status');
const crosshair = document.getElementById('crosshair');

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color('#18140d');
scene.fog = new THREE.FogExp2(0x18140d, 0.03);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.05, 200);
camera.position.set(0, 1.7, 0);
camera.rotation.order = 'YXZ';

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xfff0d0, 0.4));
const hemi = new THREE.HemisphereLight(0xfff8e8, 0x221c10, 0.3);
scene.add(hemi);

for (let gx = -1; gx <= 1; gx++) {
  for (let gz = -1; gz <= 1; gz++) {
    const pl = new THREE.PointLight(0xfffbe8, 1.0, 14);
    pl.position.set(gx * 4, 4.8, gz * 4);
    pl.castShadow = true;
    pl.shadow.mapSize.set(512, 512);
    scene.add(pl);
  }
}

const consolGlow = new THREE.PointLight(0xff7722, 0.5, 8);
consolGlow.position.set(0, 1.5, -8);
scene.add(consolGlow);

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── State ──
let pointerLocked = false;
let modelReady = false;
const moveState = { forward: false, backward: false, left: false, right: false };
const MOVE_SPEED = 0.8;
const LOOK_SENS = 0.002;
const PITCH_LIMIT = 1.2;
let yaw = 0, pitch = 0;

// Collision detection
const collisionMeshes = [];  // meshes to collide against (walls, floor, furniture)
const COLLISION_DISTANCE = 0.15; // how close we can get to walls

// ── Pointer Lock ──
function requestLock() {
  renderer.domElement.requestPointerLock();
}

document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
  if (pointerLocked) {
    overlay.classList.add('hidden');
    crosshair.style.display = 'block';
  } else {
    overlay.classList.remove('hidden');
    crosshair.style.display = 'none';
  }
});

document.addEventListener('mousemove', (e) => {
  if (!pointerLocked) return;
  yaw   -= e.movementX * LOOK_SENS;
  pitch -= e.movementY * LOOK_SENS;
  pitch  = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, pitch));
  camera.rotation.set(pitch, yaw, 0);
});

// ── Enter button ──
enterBtn.addEventListener('click', () => {
  if (!modelReady) return;
  requestLock();
});

// ── Keyboard ──
const keyMap = {
  KeyW: 'forward', ArrowUp: 'forward',
  KeyS: 'backward', ArrowDown: 'backward',
  KeyA: 'left', ArrowLeft: 'left',
  KeyD: 'right', ArrowRight: 'right',
};

document.addEventListener('keydown', (e) => {
  if (keyMap[e.code]) moveState[keyMap[e.code]] = true;
});
document.addEventListener('keyup', (e) => {
  if (keyMap[e.code]) moveState[keyMap[e.code]] = false;
});

// ── Status helper ──
function setStatus(msg) { statusEl.textContent = msg; }

// =============================================
// INLINE GLTF PARSER
// =============================================

async function loadGLTF() {
  try {
    setStatus('Fetching model\u2026');

    const gltfResp = await fetch('./scene.gltf');
    if (!gltfResp.ok) throw new Error('Failed to fetch scene.gltf: ' + gltfResp.status);
    const gltfArrayBuf = await gltfResp.arrayBuffer();

    // Check for GLB magic
    const magic = new Uint32Array(gltfArrayBuf, 0, 1)[0];
    let gltf;
    let binBuffer;

    if (magic === 0x46546C67) {
      // GLB
      const view = new DataView(gltfArrayBuf);
      const jsonLen = view.getUint32(12, true);
      const jsonStr = new TextDecoder().decode(new Uint8Array(gltfArrayBuf, 20, jsonLen));
      gltf = JSON.parse(jsonStr);
      const binOffset = 20 + jsonLen + 8;
      binBuffer = gltfArrayBuf.slice(binOffset);
    } else {
      const jsonStr = new TextDecoder().decode(gltfArrayBuf);
      gltf = JSON.parse(jsonStr);
    }

    setStatus('Parsing\u2026');

    // Load binary buffer
    const buffers = [];
    for (const bufDef of gltf.buffers || []) {
      if (binBuffer && !bufDef.uri) {
        buffers.push(binBuffer);
      } else {
        const resp = await fetch('./' + bufDef.uri);
        if (!resp.ok) throw new Error('Failed to fetch buffer: ' + bufDef.uri);
        buffers.push(await resp.arrayBuffer());
      }
    }

    // Load textures
    const textureLoader = new THREE.TextureLoader();
    const textures = [];
    const textureLoadErrors = [];

    if (gltf.images) {
      for (const img of gltf.images) {
        try {
          const tex = await new Promise((resolve, reject) => {
            textureLoader.load('./' + img.uri,
              (t) => { t.encoding = THREE.sRGBEncoding; resolve(t); },
              undefined,
              () => reject(new Error(img.uri))
            );
          });
          textures.push(tex);
        } catch (err) {
          textureLoadErrors.push(img.uri);
          textures.push(null);
        }
      }
    }

    if (textureLoadErrors.length > 0) {
      console.warn('Textures that failed to load:', textureLoadErrors);
    }

    // Ensure all textures tile properly
    for (const tex of textures) {
      if (tex) {
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
      }
    }

    // Resolve sampler → texture
    const gltfTextures = (gltf.textures || []).map(t => {
      const sourceIdx = t.source;
      return textures[sourceIdx] || null;
    });

    setStatus('Building geometry\u2026');

    // ── Helper: get accessor data ──
    function getAccessorData(accIdx) {
      const acc = gltf.accessors[accIdx];
      const bv = gltf.bufferViews[acc.bufferView];
      const buf = buffers[bv.buffer];
      const byteOffset = (bv.byteOffset || 0) + (acc.byteOffset || 0);
      const compSizes = { SCALAR: 1, VEC2: 2, VEC3: 3, VEC4: 4, MAT4: 16 };
      const numComponents = compSizes[acc.type] || 1;
      const count = acc.count;
      const stride = bv.byteStride || 0;

      let TypedArray;
      switch (acc.componentType) {
        case 5120: TypedArray = Int8Array; break;
        case 5121: TypedArray = Uint8Array; break;
        case 5122: TypedArray = Int16Array; break;
        case 5123: TypedArray = Uint16Array; break;
        case 5125: TypedArray = Uint32Array; break;
        case 5126: TypedArray = Float32Array; break;
        default: TypedArray = Float32Array;
      }

      if (stride && stride !== numComponents * TypedArray.BYTES_PER_ELEMENT) {
        // Interleaved: must manually deinterleave
        const result = new TypedArray(count * numComponents);
        const srcView = new DataView(buf);
        for (let i = 0; i < count; i++) {
          const off = byteOffset + i * stride;
          for (let j = 0; j < numComponents; j++) {
            const pos = off + j * TypedArray.BYTES_PER_ELEMENT;
            if (TypedArray === Float32Array) result[i * numComponents + j] = srcView.getFloat32(pos, true);
            else if (TypedArray === Uint16Array) result[i * numComponents + j] = srcView.getUint16(pos, true);
            else if (TypedArray === Uint32Array) result[i * numComponents + j] = srcView.getUint32(pos, true);
            else result[i * numComponents + j] = srcView.getUint8(pos);
          }
        }
        return { data: result, count, numComponents, componentType: acc.componentType };
      }

      const data = new TypedArray(buf, byteOffset, count * numComponents);
      return { data, count, numComponents, componentType: acc.componentType };
    }

    // ── Build materials ──
    const materials = (gltf.materials || []).map(matDef => {
      const params = {};
      const pbr = matDef.pbrMetallicRoughness || {};

      if (pbr.baseColorFactor) {
        params.color = new THREE.Color(pbr.baseColorFactor[0], pbr.baseColorFactor[1], pbr.baseColorFactor[2]);
        if (pbr.baseColorFactor[3] < 1) {
          params.transparent = true;
          params.opacity = pbr.baseColorFactor[3];
        }
      }

      if (pbr.baseColorTexture && gltfTextures[pbr.baseColorTexture.index]) {
        params.map = gltfTextures[pbr.baseColorTexture.index];
      }

      params.metalness = pbr.metallicFactor !== undefined ? pbr.metallicFactor : 0;
      params.roughness = pbr.roughnessFactor !== undefined ? pbr.roughnessFactor : 1;

      if (matDef.doubleSided) params.side = THREE.DoubleSide;

      const mat = new THREE.MeshStandardMaterial(params);
      mat.name = matDef.name || '';
      return mat;
    });

    // Default material
    const defaultMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });

    // ── Build meshes ──
    function buildMesh(meshIdx) {
      const meshDef = gltf.meshes[meshIdx];
      const group = new THREE.Group();
      group.name = meshDef.name || 'mesh_' + meshIdx;

      for (const prim of meshDef.primitives) {
        const geom = new THREE.BufferGeometry();

        if (prim.attributes.POSITION !== undefined) {
          const d = getAccessorData(prim.attributes.POSITION);
          geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(d.data), 3));
        }

        if (prim.attributes.NORMAL !== undefined) {
          const d = getAccessorData(prim.attributes.NORMAL);
          geom.setAttribute('normal', new THREE.BufferAttribute(new Float32Array(d.data), 3));
        }

        if (prim.attributes.TEXCOORD_0 !== undefined) {
          const d = getAccessorData(prim.attributes.TEXCOORD_0);
          geom.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(d.data), 2));
        }

        if (prim.indices !== undefined) {
          const d = getAccessorData(prim.indices);
          if (d.componentType === 5125) {
            geom.setIndex(new THREE.BufferAttribute(new Uint32Array(d.data), 1));
          } else {
            geom.setIndex(new THREE.BufferAttribute(new Uint16Array(d.data), 1));
          }
        }

        if (!prim.attributes.NORMAL) {
          geom.computeVertexNormals();
        }

        const mat = prim.material !== undefined ? materials[prim.material] : defaultMat;
        const mesh = new THREE.Mesh(geom, mat);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        group.add(mesh);
      }

      return group.children.length === 1 ? group.children[0] : group;
    }

    // ── Build node tree ──
    function buildNode(nodeIdx) {
      const nodeDef = gltf.nodes[nodeIdx];
      let obj;

      if (nodeDef.mesh !== undefined) {
        obj = buildMesh(nodeDef.mesh);
      } else {
        obj = new THREE.Group();
      }

      obj.name = nodeDef.name || 'node_' + nodeIdx;

      if (nodeDef.matrix) {
        const m = new THREE.Matrix4();
        m.fromArray(nodeDef.matrix);
        obj.applyMatrix4(m);
      } else {
        if (nodeDef.translation) obj.position.fromArray(nodeDef.translation);
        if (nodeDef.rotation) obj.quaternion.fromArray(nodeDef.rotation);
        if (nodeDef.scale) obj.scale.fromArray(nodeDef.scale);
      }

      if (nodeDef.children) {
        for (const childIdx of nodeDef.children) {
          obj.add(buildNode(childIdx));
        }
      }

      return obj;
    }

    // Build scene
    const sceneDef = gltf.scenes[gltf.scene || 0];
    const root = new THREE.Group();
    root.name = 'GLTFRoot';
    for (const nodeIdx of sceneDef.nodes) {
      root.add(buildNode(nodeIdx));
    }

    // ── Scale & centre on the ROOM, ignoring distant outlier geometry ──
    // The model has an outlier mesh at GLTF Z≈-466 that makes the overall
    // bounding box ~50× larger than the studio room. We find a known interior
    // object (redchair1), use it as an anchor, and only include nearby meshes
    // when computing the room bounds used for scaling and centering.

    scene.add(root);
    root.updateMatrixWorld(true);

    // Step 1 — locate anchor object's real geometry centre
    let anchorNode = null;
    root.traverse(obj => { if (obj.name === 'redchair1') anchorNode = obj; });
    const anchorBox = new THREE.Box3().setFromObject(anchorNode || root);
    const anchorPos = new THREE.Vector3();
    anchorBox.getCenter(anchorPos);
    console.log('Anchor centre (pre-scale):', anchorPos);

    // Step 2 — build room-only bounding box (meshes within 2000 units of anchor)
    const roomBox = new THREE.Box3();
    root.traverse(obj => {
      if (obj.isMesh) {
        const mb = new THREE.Box3().setFromObject(obj);
        const mc = new THREE.Vector3();
        mb.getCenter(mc);
        if (mc.distanceTo(anchorPos) < 2000) {
          roomBox.union(mb);
        }
      }
    });
    const roomSize = new THREE.Vector3();
    roomBox.getSize(roomSize);
    const roomCentre = new THREE.Vector3();
    roomBox.getCenter(roomCentre);
    console.log('Room bounds (pre-scale):', roomBox.min, roomBox.max, 'size:', roomSize);

    // Step 3 — scale so the room's longest axis fits in 20 units
    const roomMax = Math.max(roomSize.x, roomSize.y, roomSize.z);
    const scaleFactor = 20 / roomMax;
    root.scale.multiplyScalar(scaleFactor);

    // Step 4 — offset root so room centre is at world origin, floor at y=0
    root.position.x = -roomCentre.x * scaleFactor;
    root.position.z = -roomCentre.z * scaleFactor;
    root.position.y = -roomBox.min.y * scaleFactor;

    root.updateMatrixWorld(true);

    // ── Inspect scene graph ──
    console.group('Scene Graph');
    const meshNames = [], groupNames = [], lightNames = [];
    root.traverse(obj => {
      if (obj.isMesh) meshNames.push(obj.name);
      else if (obj.isLight) lightNames.push(obj.name);
      else groupNames.push(obj.name);
    });
    console.log('Meshes:', meshNames);
    console.log('Groups:', groupNames);
    console.log('Lights:', lightNames);
    console.groupEnd();

    // ── Collect collision meshes (all scene meshes) ──
    root.traverse(obj => {
      if (obj.isMesh) {
        collisionMeshes.push(obj);
      }
    });
    console.log('Collision meshes:', collisionMeshes.length);

    // ── Spawn camera at manually calibrated position ──
    const SPAWN = { x: -6.043, y: 0.121, z: 9.748 };
    const SPAWN_YAW = 345 * Math.PI / 180; // 345°
    camera.position.set(SPAWN.x, SPAWN.y, SPAWN.z);
    yaw = SPAWN_YAW; pitch = 0;
    camera.rotation.set(0, yaw, 0);
    console.log('Camera placed at:', camera.position);

    // ── Done ──
    setStatus('Ready');
    modelReady = true;
    enterBtn.disabled = false;
    enterBtn.textContent = 'ENTER STUDIO';

    if (textureLoadErrors.length > 0) {
      console.warn('Note: ' + textureLoadErrors.length + ' textures failed to load. Materials will use base colors instead.');
    }

    console.log('Room dimensions after auto-scale:', roomSize.clone().multiplyScalar(scaleFactor));
    console.log('Scale factor applied:', scaleFactor);

  } catch (err) {
    console.error('GLTF load error:', err);
    setStatus('Error: ' + err.message);
  }
}

// ── Animation loop ──
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  // Movement with collision detection
  if (pointerLocked) {
    const dir = new THREE.Vector3();
    const front = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    front.y = 0;
    front.normalize();
    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
    right.y = 0;
    right.normalize();

    if (moveState.forward)  dir.add(front);
    if (moveState.backward) dir.sub(front);
    if (moveState.right)    dir.add(right);
    if (moveState.left)     dir.sub(right);

    if (dir.lengthSq() > 0) {
      dir.normalize();
      const step = MOVE_SPEED * dt;
      const newPos = camera.position.clone().add(dir.clone().multiplyScalar(step));
      newPos.y = 0.121;

      // Cast rays from player position in movement direction to detect walls
      const collisionRay = new THREE.Raycaster();

      // Check multiple ray heights for better wall detection
      let blocked = false;
      const rayHeights = [0.3, 0.8, 1.4];
      for (const rh of rayHeights) {
        if (blocked) break;
        const origin = camera.position.clone();
        origin.y = rh;
        collisionRay.set(origin, dir);
        collisionRay.far = COLLISION_DISTANCE + step;
        const hits = collisionRay.intersectObjects(collisionMeshes, false);
        if (hits.length > 0 && hits[0].distance < COLLISION_DISTANCE + step) {
          blocked = true;
        }
      }

      if (!blocked) {
        camera.position.copy(newPos);
      }
    }

    // Lock to calibrated eye height
    camera.position.y = 0.121;
  }

  // Live coordinate HUD
  const hud = document.getElementById('coordHUD');
  if (pointerLocked && hud) {
    hud.style.display = 'block';
    hud.textContent =
      `X: ${camera.position.x.toFixed(3)}\n` +
      `Y: ${camera.position.y.toFixed(3)}\n` +
      `Z: ${camera.position.z.toFixed(3)}\n` +
      `Yaw: ${(yaw * 180 / Math.PI).toFixed(1)}°`;
  } else if (hud) {
    hud.style.display = 'none';
  }

  renderer.render(scene, camera);
}

// ── Start ──
loadGLTF();
animate();

})();
</script>
</body>
</html>
