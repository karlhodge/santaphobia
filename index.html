<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Santaphobia — 3D Gallery</title>
    <meta name="description" content="A walkable recreation of the Santaphobia gallery, rebuilt from its Spatial scene export." />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="gallery-data.js"></script>
    <style>
      html, body { margin: 0; height: 100%; background: #111; font-family: system-ui, sans-serif; }
      #intro {
        position: fixed; z-index: 10; left: 50%; top: 18px; transform: translateX(-50%);
        background: rgba(0,0,0,0.65); color: #fff; padding: 10px 16px; border-radius: 8px;
        font-size: 14px; line-height: 1.5; max-width: 92vw; text-align: center;
        pointer-events: none; transition: opacity 0.6s; backdrop-filter: blur(4px);
      }
      #intro b { color: #ffd27f; }
      #intro.hide { opacity: 0; }
      #count { position: fixed; z-index: 10; left: 12px; bottom: 10px; color: #aaa; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="intro">
      <b>Drag</b> to look · <b>W A S D</b> / arrows to walk · <b>Q E</b> to turn · headset button for VR
    </div>
    <div id="count"></div>

    <a-scene gallery background="color: #8f99a6" renderer="colorManagement: true; antialias: true; physicallyCorrectLights: false; toneMapping: ACESFilmic; exposure: 1.15">
      <a-assets>
        <img id="skyTex" src="textures/mountains.jpg" crossorigin="anonymous" />
        <img id="waterNormal" src="textures/water-normal.png" crossorigin="anonymous" />
        <img id="cloudTex" src="textures/clouds.png" crossorigin="anonymous" />
        <img id="mistTex" src="textures/mist.png" crossorigin="anonymous" />
      </a-assets>

      <!-- Lighting: airy gallery fill + a high near-white "sun" matching the sun
           in the panorama (high, upper-right). -->
      <a-entity light="type: hemisphere; color: #ffffff; groundColor: #b9bcc4; intensity: 1.05"></a-entity>
      <a-entity light="type: ambient; color: #ffffff; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; color: #fff4e0; intensity: 1.5" position="-28 90 -34"></a-entity>
      <a-entity light="type: directional; color: #dfe8ff; intensity: 0.4" position="40 24 60"></a-entity>

      <!-- 360° sky panorama (mountains + lake) + surrounding reflecting pool.
           fog:false so the panorama isn't washed out; the model's own water mesh
           is hidden in init so it can't z-fight our larger animated pool.
           position y>0 lifts the sphere so the mountains' lower slopes (which sit
           below the panorama's own horizon) rise to meet the waterline; the
           panorama's lake stays hidden under our water. Raise/lower to taste. -->
      <a-sky src="#skyTex" radius="4000" position="0 300 0" material="fog: false" sharp-texture></a-sky>
      <a-plane id="water" water-flow sharp-texture rotation="-90 0 0" width="3000" height="3000" position="0 0.04 -22"
               material="shader: standard; color: #2e2e22; transparent: true; opacity: 0.8;
                         normalMap: #waterNormal; normalTextureRepeat: 500 500; normalScale: 0.5 0.5;
                         roughness: 0.2; metalness: 0.1"></a-plane>

      <!-- Drifting mist over the water, OUTSIDE only: it sits just below the
           gallery floor (y<0.305) so the opaque floor hides it indoors, while it
           reads as low fog on the lake outside. Distance fog (above) blends it. -->
      <a-plane id="mist" drift-map rotation="-90 0 0" width="3000" height="3000" position="0 0.25 -22"
               material="src: #mistTex; transparent: true; opacity: 0.6; side: double; depthWrite: false; repeat: 6 6"></a-plane>

      <!-- Subtle drifting clouds layered over the panorama for a little motion. -->
      <a-entity id="clouds" sharp-texture
                geometry="primitive: sphere; radius: 2500; segmentsWidth: 64; segmentsHeight: 40"
                material="src: #cloudTex; transparent: true; opacity: 0.7; side: back; depthWrite: false; fog: false"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 480000; easing: linear"></a-entity>

      <!-- Visitor -->
      <a-entity id="rig" key-turn>
        <a-camera position="0 1.8 0" look-controls="pointerLockEnabled: false" wasd-controls="acceleration: 25; fly: false" wall-collider="buffer: 0.4"></a-camera>
      </a-entity>
    </a-scene>

    <script>
      // Scroll the water's normal map so the reflecting pool ripples.
      AFRAME.registerComponent('water-flow', {
        tick: function (time, dt) {
          const mesh = this.el.getObject3D('mesh');
          const nm = mesh && mesh.material && mesh.material.normalMap;
          if (!nm) return;
          nm.offset.x = (nm.offset.x + dt * 0.000009) % 1;
          nm.offset.y = (nm.offset.y + dt * 0.000014) % 1;
        },
      });

      // Scroll a material's base map so the mist layer drifts.
      AFRAME.registerComponent('drift-map', {
        tick: function (time, dt) {
          const mesh = this.el.getObject3D('mesh');
          const m = mesh && mesh.material && mesh.material.map;
          if (!m) return;
          m.offset.x = (m.offset.x + dt * 0.000008) % 1;
          m.offset.y = (m.offset.y + dt * 0.000005) % 1;
        },
      });

      // Apply maximum anisotropic filtering to a texture so it stays sharp at
      // grazing angles (e.g. the sky panorama / mountains seen near the horizon).
      AFRAME.registerComponent('sharp-texture', {
        tick: function () {
          if (this.done) return;
          const mesh = this.el.getObject3D('mesh');
          const mat = mesh && mesh.material;
          if (!mat) return;
          const maxA = this.el.sceneEl.renderer.capabilities.getMaxAnisotropy();
          let set = false;
          for (const key of ['map', 'normalMap']) {
            if (mat[key]) { mat[key].anisotropy = maxA; mat[key].needsUpdate = true; set = true; }
          }
          if (set) { mat.needsUpdate = true; this.done = true; }
        },
      });

      // Stop the camera passing through walls. Each frame it validates the move
      // the controls just made: raycast from the previous position toward the new
      // one against the room meshes; if a wall is within the buffer, slide along
      // the wall (remove the into-wall component) or, if that's blocked too, stop.
      AFRAME.registerComponent('wall-collider', {
        schema: { buffer: { default: 0.4 } },
        init: function () {
          this.ray = new THREE.Raycaster();
          this.prev = new THREE.Vector3();
          this.cur = new THREE.Vector3();
          this.targets = [];
          this.ready = false;
          this.el.object3D.getWorldPosition(this.prev);
        },
        clear: function (mx, mz) {            // true if path of length |m| (+buffer) is wall-free
          const d = Math.hypot(mx, mz);
          if (d < 1e-6) return true;
          this.ray.set(new THREE.Vector3(this.prev.x, this.prev.y, this.prev.z), new THREE.Vector3(mx / d, 0, mz / d));
          this.ray.far = d + this.data.buffer;
          return this.ray.intersectObjects(this.targets, false).length === 0;
        },
        tick: function () {
          const obj = this.el.object3D;
          if (!this.ready) {
            const room = this.roomEl || (this.roomEl = document.querySelector('[gltf-model]'));
            const m = room && room.getObject3D('mesh');
            if (m) { this.targets = []; m.traverse((o) => { if (o.isMesh) this.targets.push(o); }); this.ready = this.targets.length > 0; }
            obj.getWorldPosition(this.prev);
            return;
          }
          obj.getWorldPosition(this.cur);
          const dx = this.cur.x - this.prev.x, dz = this.cur.z - this.prev.z;
          const dist = Math.hypot(dx, dz);
          if (dist < 1e-5) { this.prev.copy(this.cur); return; }
          if (!this.clear(dx, dz)) {
            let nx = this.prev.x, nz = this.prev.z;     // default: stop
            const hit = this.ray.intersectObjects(this.targets, false)[0];
            if (hit && hit.face) {
              const n = hit.face.normal.clone().transformDirection(hit.object.matrixWorld);
              n.y = 0; n.normalize();
              const dot = dx * n.x + dz * n.z;
              const sx = dx - n.x * dot, sz = dz - n.z * dot;   // slide along the wall
              if (this.clear(sx, sz)) { nx = this.prev.x + sx; nz = this.prev.z + sz; }
            }
            const corrected = new THREE.Vector3(nx, this.cur.y, nz);
            obj.parent.worldToLocal(corrected);
            obj.position.x = corrected.x; obj.position.z = corrected.z;
          }
          obj.getWorldPosition(this.prev);
        },
      });

      // Turn the view with Q (left) / E (right) — rotates the rig so it composes
      // with mouse look-controls; held = continuous smooth turn.
      AFRAME.registerComponent('key-turn', {
        schema: { speed: { default: 90 } },   // degrees per second
        init: function () {
          this.q = false; this.e = false;
          const set = (e, v) => { if (e.code === 'KeyQ') this.q = v; else if (e.code === 'KeyE') this.e = v; };
          this.onDown = (e) => set(e, true);
          this.onUp = (e) => set(e, false);
          this.onBlur = () => { this.q = false; this.e = false; };
          window.addEventListener('keydown', this.onDown);
          window.addEventListener('keyup', this.onUp);
          window.addEventListener('blur', this.onBlur);
        },
        remove: function () {
          window.removeEventListener('keydown', this.onDown);
          window.removeEventListener('keyup', this.onUp);
          window.removeEventListener('blur', this.onBlur);
        },
        tick: function (time, dt) {
          const d = (this.q ? 1 : 0) - (this.e ? 1 : 0);   // Q=+left, E=-right
          if (!d) return;
          const camEl = this.camEl || (this.camEl = this.el.querySelector('a-camera') || this.el.querySelector('[camera]'));
          if (!camEl) return;
          const cam = camEl.object3D, rig = this.el.object3D;
          // Rotate about the player's position: turn the rig, then shift it so the
          // camera's world position is unchanged (otherwise it orbits the pivot).
          const before = new THREE.Vector3(); cam.getWorldPosition(before);
          rig.rotation.y += d * THREE.MathUtils.degToRad(this.data.speed) * (dt / 1000);
          const after = new THREE.Vector3(); cam.getWorldPosition(after);
          rig.position.x -= (after.x - before.x);
          rig.position.z -= (after.z - before.z);
        },
      });

      // Plain stand-in room used only when no GLB model is present.
      function buildFallbackRoom(scene, mk, data) {
        const b = data.bounds;
        const margin = 5;
        const minX = b.minX - margin, maxX = b.maxX + margin;
        const minZ = b.minZ - margin, maxZ = b.maxZ + margin;
        const w = maxX - minX, d = maxZ - minZ;
        const cx = (minX + maxX) / 2, cz = (minZ + maxZ) / 2;
        const wallH = 7;
        scene.appendChild(mk(`<a-plane rotation="-90 0 0" width="${w}" height="${d}" position="${cx} 0 ${cz}" material="color: #4a4a52; roughness: 0.95"></a-plane>`));
        scene.appendChild(mk(`<a-plane rotation="90 0 0" width="${w}" height="${d}" position="${cx} ${wallH} ${cz}" material="color: #26262c; side: double"></a-plane>`));
        const wall = (x, y, z, ww, rotY) =>
          `<a-plane position="${x} ${y} ${z}" rotation="0 ${rotY} 0" width="${ww}" height="${wallH}" material="color: #e9e7e2; side: double; roughness: 1"></a-plane>`;
        scene.appendChild(mk(wall(cx, wallH / 2, minZ, w, 0)));
        scene.appendChild(mk(wall(cx, wallH / 2, maxZ, w, 180)));
        scene.appendChild(mk(wall(minX, wallH / 2, cz, d, 90)));
        scene.appendChild(mk(wall(maxX, wallH / 2, cz, d, -90)));
      }

      // Build the room and hang every frame from the generated layout.
      AFRAME.registerComponent('gallery', {
        init: async function () {
          const data = window.GALLERY_DATA;
          const scene = this.el;
          if (!data) { console.error('GALLERY_DATA missing'); return; }

          document.getElementById('count').textContent = data.count + ' works · Santaphobia';

          const mk = (html) => {
            const wrap = document.createElement('template');
            wrap.innerHTML = html.trim();
            return wrap.content.firstChild;
          };

          // --- Environment: real Obsidian Gallery model if present, else fallback ---
          // The original Spatial room template isn't in the scene export. If you
          // export the Obsidian Gallery from Unity to models/obsidian-gallery.glb,
          // it loads here as the actual room. Otherwise we build a plain stand-in
          // sized to the frame layout so the gallery is still walkable.
          const MODEL_URL = 'models/obsidian-gallery.glb';
          // Optional transform to align the model to the frame coordinate space.
          // Tweak if the room is offset/rotated/scaled relative to the frames.
          const MODEL = window.GALLERY_MODEL || { position: '0 0 0', rotation: '0 0 0', scale: '1 1 1' };

          let hasModel = false;
          try {
            const head = await fetch(MODEL_URL, { method: 'HEAD' });
            hasModel = head.ok && (head.headers.get('content-type') || '').indexOf('text/html') === -1;
          } catch (e) { hasModel = false; }

          if (hasModel) {
            const room = mk(`<a-entity gltf-model="url(${MODEL_URL})"
                position="${MODEL.position}" rotation="${MODEL.rotation}" scale="${MODEL.scale}"></a-entity>`);
            // Hide the model's built-in water mesh; our larger animated pool
            // replaces it (otherwise the two coplanar surfaces z-fight at the
            // entrance pool).
            room.addEventListener('model-loaded', function () {
              room.object3D.traverse(function (o) {
                const nm = ((o.name || '') + ' ' + (o.material && o.material.name || '')).toLowerCase();
                if (nm.includes('water')) o.visible = false;
              });
            });
            scene.appendChild(room);
          } else {
            buildFallbackRoom(scene, mk, data);
          }

          // ?labels — float each frame's map number beside it (matches
          // gallery-map.svg / .md) so glitches can be reported per-number.
          const showLabels = new URLSearchParams(location.search).has('labels');

          // Frames
          data.frames.forEach(function (f, i) {
            const container = mk(`<a-entity class="frame"></a-entity>`);
            scene.appendChild(container);
            container.object3D.position.set(f.position.x, f.position.y, f.position.z);
            container.object3D.quaternion.set(f.quaternion.x, f.quaternion.y, f.quaternion.z, f.quaternion.w);

            if (showLabels) {
              const tag = mk(`<a-entity text="value: ${i + 1}; align: center; color: #ffd34d; width: 16"
                  position="0 2.05 0.06"></a-entity>`);
              container.appendChild(tag);
            }

            // Backing panel: a slim white mount behind each print. With the real
            // room loaded the gallery already has walls, but the mount gives the
            // prints a physical frame and hides any small gap to the wall.
            const backing = mk(`<a-box depth="0.08" width="3" height="3" position="0 0 -0.04" material="color: #f4f2ee; roughness: 1"></a-box>`);
            container.appendChild(backing);

            // The picture itself, on the front face (local +Z).
            const pic = mk(`<a-entity class="picture"
                geometry="primitive: plane; width: 2; height: 2"
                material="shader: flat; side: double; src: url(images/${encodeURIComponent(f.file)})"
                position="0 0 0.03"></a-entity>`);
            container.appendChild(pic);

            // Size the picture (and its backing) to the image's real aspect ratio
            // once the texture loads. Spatial's frames are uniform scale 3, so we
            // give every print the same height and let width follow the aspect.
            pic.addEventListener('materialtextureloaded', function (e) {
              const img = e.detail.texture && e.detail.texture.image;
              if (!img || !img.width) return;
              const aspect = img.width / img.height;
              let h = 2.4, ww = h * aspect;
              const maxW = 3.6;
              if (ww > maxW) { ww = maxW; h = ww / aspect; }
              pic.setAttribute('geometry', { width: ww, height: h });
              backing.setAttribute('width', ww + 0.25);
              backing.setAttribute('height', h + 0.25);
            });
          });

          // Place the visitor at the recorded spawn point, standing on the floor.
          // The Obsidian model's walkable floor sits at y≈0.305 (one foot); with
          // the camera ~1.65 m above that, the eye is at a natural standing level.
          const floorY = hasModel ? 0.305 : 0;
          const rig = document.getElementById('rig');
          rig.object3D.position.set(data.spawn.x, floorY, data.spawn.z);

          // Fade the hint out after a few seconds.
          setTimeout(() => document.getElementById('intro').classList.add('hide'), 6000);
        },
      });
    </script>
  </body>
</html>
