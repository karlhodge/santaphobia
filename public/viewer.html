<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>World Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="/viewer-components.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }

    #ui-overlay {
      position: fixed; top: 0; left: 0; right: 0;
      pointer-events: none; z-index: 100;
      padding: 1rem 1.5rem;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    #world-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.85rem; color: rgba(200,190,255,0.7);
      letter-spacing: 0.08em; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    #controls-hint {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.75rem; color: rgba(150,140,200,0.6);
      text-align: right; text-shadow: 0 1px 3px rgba(0,0,0,0.8); line-height: 1.6;
    }

    #configure-link {
      position: fixed; bottom: 1rem; right: 1rem; z-index: 100;
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.75rem;
      color: rgba(150,140,200,0.5); text-decoration: none;
      background: rgba(0,0,0,0.4); padding: 0.3rem 0.7rem;
      border-radius: 4px; transition: color 0.2s;
    }
    #configure-link:hover { color: rgba(200,190,255,0.9); }

    #loading-screen {
      position: fixed; inset: 0; background: #0d0d1a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 200; font-family: 'Segoe UI', system-ui, sans-serif;
      color: #6060a0; transition: opacity 0.8s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loader-spinner {
      width: 40px; height: 40px;
      border: 2px solid #2a2a50; border-top-color: #6060ff;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p { font-size: 0.9rem; }

    #welcome-overlay {
      position: fixed; inset: 0; z-index: 150;
      background: rgba(5,5,18,0.88); backdrop-filter: blur(8px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 2rem; text-align: center;
    }
    #welcome-overlay.hidden { display: none; }
    #welcome-title { font-size: 2rem; font-weight: 300; color: #c0b8ff; letter-spacing: 0.08em; margin-bottom: 1rem; }
    #welcome-body  { font-size: 1rem; color: #8080b0; line-height: 1.7; max-width: 520px; margin-bottom: 2rem; white-space: pre-wrap; }
    #welcome-enter { background: #4040cc; color: #fff; border: none; border-radius: 8px; padding: 0.75rem 2.5rem; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    #welcome-enter:hover { background: #5050e0; }

    #hotspot-popup {
      position: fixed; bottom: 4rem; left: 50%; transform: translateX(-50%);
      z-index: 110; background: rgba(10,10,28,0.92); backdrop-filter: blur(8px);
      border: 1px solid #3030a0; border-radius: 10px;
      padding: 1rem 1.4rem; max-width: 340px; width: 90%;
      font-family: 'Segoe UI', system-ui, sans-serif; transition: opacity 0.2s;
    }
    #hotspot-popup.hidden { opacity: 0; pointer-events: none; }
    #hotspot-popup-label { font-size: 0.95rem; color: #c0b8ff; font-weight: 600; margin-bottom: 0.4rem; }
    #hotspot-popup-body  { font-size: 0.85rem; color: #8080b0; line-height: 1.5; white-space: pre-wrap; }
    #hotspot-popup-close { position: absolute; top: 0.5rem; right: 0.7rem; background: none; border: none; color: #4040a0; cursor: pointer; font-size: 1rem; }
    #hotspot-popup-close:hover { color: #c0b8ff; }
  </style>
</head>
<body>
  <div id="loading-screen"><div class="loader-spinner"></div><p>Loading world…</p></div>

  <div id="welcome-overlay" class="hidden">
    <div id="welcome-title"></div>
    <div id="welcome-body"></div>
    <button id="welcome-enter">Enter</button>
  </div>

  <div id="ui-overlay">
    <div id="world-title"></div>
    <div id="controls-hint">WASD · mouse drag to look<br>Q / E to turn · click to lock mouse</div>
  </div>

  <a id="configure-link" href="#" title="Edit this world">⚙ Configure</a>

  <div id="hotspot-popup" class="hidden">
    <button id="hotspot-popup-close">✕</button>
    <div id="hotspot-popup-label"></div>
    <div id="hotspot-popup-body"></div>
  </div>

  <a-scene id="scene"
    loading-screen="enabled: false"
    light="defaultLightsEnabled: false"
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; toneMapping: ACESFilmic; toneMappingExposure: 1.15"
    vr-mode-ui="enabled: true">

    <a-assets timeout="60000"></a-assets>
    <a-sky id="sky" radius="4000" segments-height="20" segments-width="40"></a-sky>

    <a-entity id="rig" position="0 0 5">
      <a-camera id="camera"
        position="0 1.7 0"
        look-controls="pointerLockEnabled: true; magicWindowTrackingEnabled: false"
        wasd-controls="acceleration: 20; fly: false"
        wall-collider="distance: 0.5"
        audio-listener-anchor>
      </a-camera>
    </a-entity>

  </a-scene>

  <script>
  (async function () {
    const slug = location.pathname.split('/')[2];
    document.getElementById('configure-link').href = `/configure/${slug}`;

    let config;
    try {
      const res = await fetch(`/api/worlds/${slug}/config`);
      if (!res.ok) throw new Error('Not found');
      config = await res.json();
    } catch {
      document.querySelector('#loading-screen p').textContent = 'World not found.';
      return;
    }

    document.getElementById('world-title').textContent = config.name || '';
    document.title = (config.name || 'World') + ' — World Viewer';

    const scene  = document.getElementById('scene');
    const rig    = document.getElementById('rig');
    const camera = document.getElementById('camera');

    // ── Navigation & spawn — safe to apply immediately via attributes ──────
    const nav  = config.navigation || {};
    const eyeH = nav.eyeHeight ?? 1.7;
    camera.setAttribute('position',      `0 ${eyeH} 0`);
    camera.setAttribute('wasd-controls', `acceleration: ${nav.speed ?? 20}; fly: false`);
    camera.setAttribute('look-controls',
      `pointerLockEnabled: true; magicWindowTrackingEnabled: false; reverseMouseDrag: ${nav.invertY ?? false}`);
    camera.setAttribute('wall-collider', `distance: 0.5; enabled: ${nav.collision !== false}`);

    const sp = config.spawn || { x: 0, y: 0, z: 5 };
    rig.setAttribute('position', `${sp.x} ${sp.y} ${sp.z}`);
    if (config.spawnRotY) rig.setAttribute('rotation', `0 ${config.spawnRotY} 0`);

    const rend = config.renderer || {};
    if (!rend.vrEnabled) scene.setAttribute('vr-mode-ui', 'enabled: false');

    // ── Environment — must wait for scene to initialise ───────────────────
    function initEnvironment() {
      applySkybox(config.skybox);
      applyFog(config.fog);
      applyLighting(config.lighting);
      if (scene.renderer) scene.renderer.toneMappingExposure = rend.exposure ?? 1.15;
    }

    if (scene.hasLoaded) initEnvironment();
    else scene.addEventListener('loaded', initEnvironment, { once: true });

    // ── Model ─────────────────────────────────────────────────────────────
    const mdl = config.model || {};
    const modelPath = config.modelFile
      ? `/api/worlds/${slug}/files/${config.modelFile}`
      : `/api/worlds/${slug}/files/model.glb`;

    const modelEl = document.createElement('a-entity');
    modelEl.setAttribute('gltf-model', modelPath);
    modelEl.setAttribute('scale',    `${mdl.scale ?? 1} ${mdl.scale ?? 1} ${mdl.scale ?? 1}`);
    modelEl.setAttribute('position', `0 ${mdl.yOffset ?? 0} 0`);
    modelEl.setAttribute('rotation', `0 ${mdl.yRotation ?? 0} 0`);
    modelEl.setAttribute('sharp-texture', '');
    scene.appendChild(modelEl);

    modelEl.addEventListener('model-loaded', () => {
      // Re-apply exposure now the renderer has done its first render
      if (scene.renderer) scene.renderer.toneMappingExposure = rend.exposure ?? 1.15;
      hideLoading();
      showWelcome();
    });
    setTimeout(() => { hideLoading(); showWelcome(); }, 15000);

    // ── Hotspots ──────────────────────────────────────────────────────────
    const popup      = document.getElementById('hotspot-popup');
    const popupLabel = document.getElementById('hotspot-popup-label');
    const popupBody  = document.getElementById('hotspot-popup-body');
    document.getElementById('hotspot-popup-close').addEventListener('click', () =>
      popup.classList.add('hidden'));

    (config.hotspots || []).forEach(hs => {
      if (!hs.position) return;
      const el = document.createElement('a-entity');
      el.setAttribute('position', `${hs.position.x} ${hs.position.y} ${hs.position.z}`);
      const sphere = document.createElement('a-sphere');
      sphere.setAttribute('radius', '0.1');
      sphere.setAttribute('color',  '#6060ff');
      sphere.setAttribute('opacity','0.85');
      sphere.setAttribute('class',  'clickable');
      sphere.addEventListener('click', () => {
        popupLabel.textContent = hs.label || '';
        popupBody.textContent  = hs.description || '';
        popup.classList.remove('hidden');
      });
      el.appendChild(sphere);
      const txt = document.createElement('a-text');
      txt.setAttribute('value',    hs.label || '');
      txt.setAttribute('align',    'center');
      txt.setAttribute('color',    '#c0b8ff');
      txt.setAttribute('position', '0 0.22 0');
      txt.setAttribute('width',    '2');
      el.appendChild(txt);
      scene.appendChild(el);
    });

    // ── Welcome ───────────────────────────────────────────────────────────
    const wel = config.welcome || {};
    function showWelcome() {
      if (!wel.enabled || !wel.title) return;
      const overlay = document.getElementById('welcome-overlay');
      document.getElementById('welcome-title').textContent = wel.title;
      document.getElementById('welcome-body').textContent  = wel.body || '';
      document.getElementById('welcome-enter').textContent = wel.buttonLabel || 'Enter';
      overlay.classList.remove('hidden');
      document.getElementById('welcome-enter').addEventListener('click', () =>
        overlay.classList.add('hidden'), { once: true });
    }

    function hideLoading() {
      const ls = document.getElementById('loading-screen');
      if (!ls) return;
      ls.classList.add('hidden');
      setTimeout(() => ls.remove(), 900);
    }

    // ── Sky ───────────────────────────────────────────────────────────────
    function applySkybox(skybox) {
      const sky = document.getElementById('sky');
      const type = skybox?.type || 'gradient';
      if (type === 'gradient') {
        sky.setAttribute('src',     gradientDataURL(skybox?.topColor || '#1a1a2e', skybox?.bottomColor || '#16213e'));
        sky.setAttribute('color',   '#ffffff');
        sky.setAttribute('visible', 'true');
      } else if (type === 'solid') {
        sky.removeAttribute('src');
        sky.setAttribute('color',   skybox.color || '#000000');
        sky.setAttribute('visible', 'true');
      } else if (type === 'image' && skybox.url) {
        sky.setAttribute('src',     skybox.url);
        sky.setAttribute('color',   '#ffffff');
        sky.setAttribute('visible', 'true');
      } else {
        sky.setAttribute('visible', 'false');
      }
    }

    function gradientDataURL(top, bot) {
      const c = document.createElement('canvas');
      c.width = 2; c.height = 512;
      const ctx = c.getContext('2d');
      const g = ctx.createLinearGradient(0, 0, 0, 512);
      g.addColorStop(0, top); g.addColorStop(1, bot);
      ctx.fillStyle = g; ctx.fillRect(0, 0, 2, 512);
      return c.toDataURL();
    }

    // ── Fog ───────────────────────────────────────────────────────────────
    function applyFog(fog) {
      if (fog?.enabled) {
        scene.setAttribute('fog', `type: exponential; color: ${fog.color}; density: ${fog.density}`);
      }
    }

    // ── Lighting ──────────────────────────────────────────────────────────
    function applyLighting(lt) {
      // defaultLightsEnabled: false is set on the scene, so we always add ours
      const lighting = lt || {};
      const amb = lighting.ambient || { color: '#ffffff', intensity: 0.6 };
      addLight('ambient', amb);

      const hemi = lighting.hemisphere;
      if (hemi) {
        const l = document.createElement('a-light');
        l.setAttribute('type',         'hemisphere');
        l.setAttribute('color',        hemi.skyColor    || '#b1e1ff');
        l.setAttribute('ground-color', hemi.groundColor || '#444466');
        l.setAttribute('intensity',    hemi.intensity   ?? 0.8);
        scene.appendChild(l);
      }

      const dir = lighting.directional;
      if (dir) {
        const l = document.createElement('a-light');
        l.setAttribute('type',       'directional');
        l.setAttribute('color',      dir.color     || '#fff4e0');
        l.setAttribute('intensity',  dir.intensity ?? 1.2);
        l.setAttribute('position',   `${dir.position?.x ?? -10} ${dir.position?.y ?? 20} ${dir.position?.z ?? 10}`);
        if (dir.castShadow) l.setAttribute('cast-shadow', true);
        scene.appendChild(l);
      }
    }

    function addLight(type, props) {
      const l = document.createElement('a-light');
      l.setAttribute('type',      type);
      l.setAttribute('color',     props.color     || '#ffffff');
      l.setAttribute('intensity', props.intensity ?? 1);
      scene.appendChild(l);
    }

  })();
  </script>
</body>
</html>
