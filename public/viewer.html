<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>World Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="/viewer-components.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      pointer-events: none;
      z-index: 100;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    #world-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.85rem;
      color: rgba(200,190,255,0.7);
      letter-spacing: 0.08em;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    #controls-hint {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.75rem;
      color: rgba(150,140,200,0.6);
      text-align: right;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      line-height: 1.6;
    }

    #configure-link {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      z-index: 100;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.75rem;
      color: rgba(150,140,200,0.5);
      text-decoration: none;
      background: rgba(0,0,0,0.4);
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      transition: color 0.2s;
    }
    #configure-link:hover { color: rgba(200,190,255,0.9); }

    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #6060a0;
      transition: opacity 0.8s;
    }

    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 2px solid #2a2a50;
      border-top-color: #6060ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-screen p { font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader-spinner"></div>
    <p>Loading world…</p>
  </div>

  <div id="ui-overlay">
    <div id="world-title"></div>
    <div id="controls-hint">
      WASD · mouse drag to look<br>
      Q / E to turn · click to lock mouse
    </div>
  </div>

  <a id="configure-link" href="#" title="Edit this world">⚙ Configure</a>

  <a-scene id="scene"
    loading-screen="enabled: false"
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; toneMapping: ACESFilmic; toneMappingExposure: 1.15"
    vr-mode-ui="enabled: true">

    <a-assets id="assets" timeout="60000"></a-assets>

    <!-- Sky / background — filled by JS -->
    <a-sky id="sky" radius="4000" segments-height="20" segments-width="40"></a-sky>

    <!-- Camera rig -->
    <a-entity id="rig" position="0 0 5">
      <a-camera id="camera"
        position="0 1.7 0"
        look-controls="pointerLockEnabled: true; magicWindowTrackingEnabled: false"
        wasd-controls="acceleration: 20; fly: false"
        wall-collider="distance: 0.5"
        audio-listener-anchor>
      </a-camera>
    </a-entity>

  </a-scene>

  <script>
  (async function () {
    const slug = location.pathname.split('/')[2];
    const configLink = document.getElementById('configure-link');
    configLink.href = `/configure/${slug}`;

    // Fetch config
    let config;
    try {
      const res = await fetch(`/api/worlds/${slug}/config`);
      if (!res.ok) throw new Error('Not found');
      config = await res.json();
    } catch (e) {
      document.querySelector('#loading-screen p').textContent = 'World not found.';
      return;
    }

    document.getElementById('world-title').textContent = config.name || '';
    document.title = (config.name || 'World') + ' — World Viewer';

    const scene = document.getElementById('scene');
    const rig = document.getElementById('rig');

    // Spawn
    const sp = config.spawn || { x: 0, y: 0, z: 5 };
    rig.setAttribute('position', `${sp.x} ${sp.y} ${sp.z}`);

    // Skybox
    applySkybox(config.skybox);

    // Fog
    if (config.fog && config.fog.enabled) {
      scene.setAttribute('fog', `type: exponential; color: ${config.fog.color}; density: ${config.fog.density}`);
    }

    // Lighting
    applyLighting(config.lighting, scene);

    // Load model
    const modelUrl = `/api/worlds/${slug}/model.glb`;
    const modelEl = document.createElement('a-entity');
    modelEl.setAttribute('gltf-model', modelUrl);
    modelEl.setAttribute('position', '0 0 0');
    modelEl.setAttribute('scale', '1 1 1');
    modelEl.setAttribute('sharp-texture', '');
    scene.appendChild(modelEl);

    modelEl.addEventListener('model-loaded', () => {
      hideLoading();
    });

    // Fallback if model fails or takes too long
    setTimeout(hideLoading, 15000);

    function hideLoading() {
      const ls = document.getElementById('loading-screen');
      ls.classList.add('hidden');
      setTimeout(() => ls.remove(), 900);
    }

    function applySkybox(skybox) {
      const sky = document.getElementById('sky');
      if (!skybox || skybox.type === 'gradient') {
        // Use a-gradient-sky via shader or just solid color for simplicity
        sky.setAttribute('color', skybox ? skybox.topColor : '#1a1a2e');
        // If a bottom gradient is needed, we can use a custom shader — for now solid color
        if (skybox && skybox.bottomColor && skybox.bottomColor !== skybox.topColor) {
          // Create a simple gradient via a canvas texture
          const canvas = document.createElement('canvas');
          canvas.width = 1;
          canvas.height = 256;
          const ctx = canvas.getContext('2d');
          const grd = ctx.createLinearGradient(0, 0, 0, 256);
          grd.addColorStop(0, skybox.topColor);
          grd.addColorStop(1, skybox.bottomColor);
          ctx.fillStyle = grd;
          ctx.fillRect(0, 0, 1, 256);
          const tex = new THREE.CanvasTexture(canvas);
          tex.mapping = THREE.EquirectangularReflectionMapping;
          sky.getObject3D('mesh').material.map = tex;
          sky.getObject3D('mesh').material.color.set('#ffffff');
          sky.getObject3D('mesh').material.needsUpdate = true;
        }
      } else if (skybox.type === 'solid') {
        sky.setAttribute('color', skybox.color);
      } else if (skybox.type === 'image' && skybox.url) {
        sky.setAttribute('src', skybox.url);
      } else if (skybox.type === 'none') {
        sky.remove();
        scene.setAttribute('background', `color: ${skybox.color || '#000000'}`);
      }
    }

    function applyLighting(lighting, scene) {
      if (!lighting) {
        addLight(scene, 'ambient', { color: '#fff', intensity: 0.6 });
        return;
      }
      if (lighting.ambient) {
        addLight(scene, 'ambient', lighting.ambient);
      }
      if (lighting.hemisphere) {
        const l = document.createElement('a-light');
        l.setAttribute('type', 'hemisphere');
        l.setAttribute('color', lighting.hemisphere.skyColor);
        l.setAttribute('ground-color', lighting.hemisphere.groundColor);
        l.setAttribute('intensity', lighting.hemisphere.intensity);
        scene.appendChild(l);
      }
      if (lighting.directional) {
        const d = lighting.directional;
        const l = document.createElement('a-light');
        l.setAttribute('type', 'directional');
        l.setAttribute('color', d.color);
        l.setAttribute('intensity', d.intensity);
        l.setAttribute('position', `${d.position.x} ${d.position.y} ${d.position.z}`);
        l.setAttribute('cast-shadow', true);
        scene.appendChild(l);
      }
    }

    function addLight(scene, type, props) {
      const l = document.createElement('a-light');
      l.setAttribute('type', type);
      if (props.color) l.setAttribute('color', props.color);
      if (props.intensity !== undefined) l.setAttribute('intensity', props.intensity);
      scene.appendChild(l);
    }
  })();
  </script>
</body>
</html>
